version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lms_secure_pass_2024_change_me
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend-go:
    build: ./backend-go
    ports:
      - '8080:8080'
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:lms_secure_pass_2024_change_me@postgres:5432/lms
      REDIS_URL: redis://redis:6379
      GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON: ${GOOGLE_DRIVE_SERVICE_ACCOUNT_JSON}

  backend-rust:
    build: ./backend-rust
    ports:
      - '8081:8080'
    depends_on:
      - postgres

volumes:
  postgres_data:

